function Confetti({color}){
  const pieces = Array.from({length:12},(_,i)=>i);
  return(
    <div style={{position:'absolute',top:0,left:0,right:0,pointerEvents:'none',overflow:'hidden',height:140}}>
      {pieces.map(i=>(
        <div key={i} className="confetti-piece" style={{
          left:`${8+i*7}%`,
          background:['#22C55E','#F59E0B','#EC4899','#3B82F6','#F97316','#7C3AED'][i%6],
          animationDelay:`${i*0.07}s`,
          animationDuration:`${0.8+Math.random()*0.4}s`,
        }}/>
      ))}
    </div>
  );
}

function StickerBtn({teamId,num,code,state,count,onToggle,onCount,isSpecial,T}){
  const c = state==='missing'&&isSpecial ? T.stSpec
    : state==='owned' ? T.stOwned
    : state==='duplicate' ? T.stDup
    : T.stMissing;
  const isDup = state==='duplicate';
  return(
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      <button onClick={()=>onToggle(k(teamId,num))} style={{
        background:c.bg,border:`2px solid ${c.border}`,borderRadius:10,
        padding:'5px 2px 4px',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:1,minWidth:0,userSelect:'none',
      }}>
        <span style={{fontSize:8,fontWeight:700,color:T.textMuted,lineHeight:1,fontFamily:'monospace'}}>{code}</span>
        <span style={{fontSize:14,fontWeight:900,color:c.nc,lineHeight:1}}>{num}</span>
        <span style={{fontSize:9,lineHeight:1,color:c.border,fontWeight:700}}>
          {isDup ? `${count}×` : state==='owned'?'✓':isSpecial?'✦':''}
        </span>
      </button>
      {isDup&&(
        <div style={{display:'flex',borderRadius:6,overflow:'hidden',border:`1px solid ${T.stDup.border}`}}>
          <button onClick={()=>onCount(k(teamId,num),-1)} style={{
            flex:1,background:T.stDup.bg,border:'none',color:'#F59E0B',
            fontSize:13,fontWeight:900,padding:'1px 0',lineHeight:1,
          }}>−</button>
          <button onClick={()=>onCount(k(teamId,num),1)} style={{
            flex:1,background:T.stDup.bg,border:'none',borderLeft:`1px solid ${T.stDup.border}`,
            color:'#F59E0B',fontSize:13,fontWeight:900,padding:'1px 0',lineHeight:1,
          }}>+</button>
        </div>
      )}
    </div>
  );
}

function TeamSection({team,group,stickers,dupCounts,onToggle,onCount,T}){
  const [open,setOpen]=useState(false);
  const nums=Array.from({length:team.count},(_,i)=>i+1);
  const owned=nums.filter(n=>stickers[k(team.id,n)]==='owned').length;
  const dupNums=nums.filter(n=>stickers[k(team.id,n)]==='duplicate');
  const dupTotal=dupNums.reduce((a,n)=>a+(dupCounts[k(team.id,n)]||1),0);
  const pct=Math.round(((owned+dupNums.length)/team.count)*100);
  return(
    <div style={{marginBottom:2}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',display:'flex',alignItems:'center',gap:10,
        background:open?T.teamBgOpen:T.teamBg,
        border:`1px solid ${open?group.color+'55':'transparent'}`,
        borderRadius:10,padding:'10px 12px',
      }}>
        <span style={{fontSize:22}}>{f(team.flag)}</span>
        <div style={{flex:1,textAlign:'left'}}>
          <div style={{color:T.text,fontWeight:700,fontSize:13}}>
            {team.name}
            <span style={{color:T.textMuted,fontWeight:500,marginLeft:6,fontSize:10}}>{team.code} 1-{team.count}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            <div style={{height:3,flex:1,background:T.bar,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:group.color,borderRadius:2,transition:'width 0.3s'}}/>
            </div>
          </div>
        </div>
        <div style={{textAlign:'right',minWidth:60}}>
          <span style={{fontSize:12,fontWeight:700,color:'#22C55E'}}>{owned}</span>
          {dupNums.length>0&&<span style={{fontSize:12,color:'#F59E0B'}}> +{dupTotal}rep</span>}
          <span style={{fontSize:12,color:T.textMuted}}>/{team.count}</span>
        </div>
        <span style={{color:T.textMuted,fontSize:11}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div style={{background:T.card3,borderRadius:'0 0 10px 10px',padding:'10px 10px 12px',marginTop:-4}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {nums.map(n=>(
              <StickerBtn key={n} teamId={team.id} num={n} code={team.code}
                state={stickers[k(team.id,n)]||'missing'}
                count={dupCounts[k(team.id,n)]||1}
                onToggle={onToggle} onCount={onCount}
                isSpecial={team.specials&&team.specials.includes(n)} T={T}/>
            ))}
          </div>
          <div style={{textAlign:'center',marginTop:8}}>
            <span style={{fontSize:9,color:T.textMuted}}>Toque: falta - tenho - duplicada · +/- para contar repetidas</span>
          </div>
        </div>
      )}
    </div>
  );
}

function GroupSection({group,stickers,dupCounts,onToggle,onCount,T,onComplete}){
  const [open,setOpen]=useState(false);
  const [celebrate,setCelebrate]=useState(false);
  const prevComplete=useRef(false);
  const allKeys=group.teams.flatMap(t=>Array.from({length:t.count},(_,i)=>k(t.id,i+1)));
  const owned=allKeys.filter(x=>stickers[x]==='owned').length;
  const dup=allKeys.filter(x=>stickers[x]==='duplicate').length;
  const total=allKeys.length;
  const pct=Math.round(((owned+dup)/total)*100);
  const isComplete=(owned+dup)===total;

  useEffect(()=>{
    if(isComplete&&!prevComplete.current){
      setCelebrate(true);
      setTimeout(()=>setCelebrate(false),1200);
    }
    prevComplete.current=isComplete;
  },[isComplete]);

  return(
    <div style={{marginBottom:8,position:'relative'}} className={celebrate?'celebrate':''}>
      {celebrate&&<Confetti color={group.color}/>}
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:'100%',display:'flex',alignItems:'center',gap:10,
        background:open?T.groupBgOpen:T.groupBg,
        border:`1px solid ${open?group.color:(isComplete?group.color+'88':'transparent')}`,
        borderRadius:12,padding:'12px 14px',
      }}>
        <div style={{width:36,height:36,borderRadius:9,background:group.color+'22',
          border:`2px solid ${group.color}`,display:'flex',alignItems:'center',
          justifyContent:'center',fontWeight:900,fontSize:16,color:group.color,flexShrink:0}}>
          {isComplete?'✓':group.shortName==='STAR'?'⭐':group.shortName}
        </div>
        <div style={{flex:1,textAlign:'left'}}>
          <div style={{color:T.text,fontWeight:700,fontSize:15,display:'flex',alignItems:'center',gap:6}}>
            {group.name}
            {isComplete&&<span style={{fontSize:11,color:group.color,fontWeight:700}}>COMPLETO!</span>}
          </div>
          <div style={{display:'flex',gap:5,marginTop:3}}>
            {group.teams.map(t=>(
              <span key={t.id} style={{fontSize:16,lineHeight:1}}>{f(t.flag)}</span>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            <div style={{height:3,flex:1,background:T.bar,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:group.color,borderRadius:2}}/>
            </div>
            <span style={{fontSize:10,color:T.textSub,flexShrink:0}}>{owned+dup}/{total}</span>
          </div>
        </div>
        <span style={{color:T.textMuted,fontSize:14}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div style={{marginTop:4,paddingLeft:4,paddingRight:4,display:'flex',flexDirection:'column',gap:3}}>
          {group.teams.map(team=>(
            <TeamSection key={team.id} team={team} group={group} stickers={stickers} dupCounts={dupCounts} onToggle={onToggle} onCount={onCount} T={T}/>
          ))}
        </div>
      )}
    </div>
  );
}

function MissingTab({stickers,T}){
  const [search,setSearch]=useState('');
  const items=useMemo(()=>{
    const r=[];
    for(const g of GROUPS_DATA)
      for(const t of g.teams){
        const missing=Array.from({length:t.count},(_,i)=>i+1).filter(n=>!stickers[k(t.id,n)]||stickers[k(t.id,n)]==='missing');
        if(missing.length)r.push({group:g,team:t,missing});
      }
    return r;
  },[stickers]);
  const filtered=useMemo(()=>{
    const q=search.toLowerCase().trim();
    if(!q)return items;
    return items.filter(({group,team})=>
      team.name.toLowerCase().includes(q)||
      team.code.toLowerCase().includes(q)||
      group.name.toLowerCase().includes(q)
    );
  },[items,search]);
  const total=items.reduce((a,x)=>a+x.missing.length,0);
  return(
    <div style={{padding:'0 12px 20px'}}>
      <div style={{background:T.card2,borderRadius:12,padding:'12px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:T.textSub,fontSize:13}}>Figurinhas faltando</span>
        <span style={{color:'#F87171',fontWeight:800,fontSize:26}}>{total}</span>
      </div>
      <div style={{position:'relative',marginBottom:12}}>
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:16,pointerEvents:'none'}}>🔍</span>
        <input type="text"
          placeholder="Filtrar selecao..."
          value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:'100%',background:T.inputBg,border:`1px solid ${T.inputBorder}`,
            borderRadius:10,padding:'9px 36px 9px 38px',
            color:T.text,fontSize:13,outline:'none'}}
        />
        {search&&<button onClick={()=>setSearch('')} style={{
          position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
          background:'none',border:'none',color:T.textMuted,fontSize:18,lineHeight:1,padding:2}}>×</button>}

                  );

          );
        })
      }
    </div>
  );
}

function DupTab({stickers,dupCounts,T}){
  const items=useMemo(()=>{
    const r=[];
    for(const g of GROUPS_DATA)
      for(const t of g.teams){
        const nums=Array.from({length:t.count},(_,i)=>i+1).filter(n=>stickers[k(t.id,n)]==='duplicate');
        if(nums.length)r.push({group:g,team:t,nums});
      }
    return r;
  },[stickers]);
  const total=items.reduce((a,x)=>a+x.nums.reduce((b,n)=>b+(dupCounts[k(x.team.id,n)]||1),0),0);
  return(
    <div style={{padding:'0 12px 20px'}}>
      <div style={{background:T.card2,borderRadius:12,padding:'12px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{color:T.textSub,fontSize:13}}>Total para trocar</span>
        <span style={{color:'#F59E0B',fontWeight:800,fontSize:26}}>{total}</span>
      </div>
      {total===0
        ?<div style={{textAlign:'center',padding:40}}><div style={{fontSize:40}}>🔄</div><div style={{color:T.textSub,fontSize:14,marginTop:8}}>Nenhuma duplicada ainda</div></div>
        :(
          <>
            <div style={{background:T.card,borderRadius:10,padding:'10px 12px',marginBottom:10}}>
              <div style={{color:T.textMuted,fontSize:10,marginBottom:6,letterSpacing:1}}>LISTA PARA COMPARTILHAR</div>

                {items.map(({team,nums})=>(
                  <div key={team.id}>

                      const c=dupCounts[k(team.id,n)]||1;
                      return c>1?`${n}(${c}x)`:n;
                    }).join(', ')}

                ))}
              </div>
            </div>

              <div key={team.id} style={{marginBottom:6,background:T.card,borderRadius:10,padding:'10px 12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:18}}>{f(team.flag)}</span>
                  <span style={{color:T.text,fontWeight:700,fontSize:13}}>{team.name}</span>
                  <span style={{fontSize:11,color:'#F59E0B',marginLeft:'auto',fontWeight:700}}>
                    {nums.reduce((a,n)=>a+(dupCounts[k(team.id,n)]||1),0)} para trocar
                  </span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {nums.map(n=>{
                    const c=dupCounts[k(team.id,n)]||1;
                    return(
                      <span key={n} style={{background:'#2E1E00',border:'1.5px solid #F59E0B',borderRadius:6,padding:'2px 7px',fontSize:11,color:'#F59E0B',fontWeight:700}}>
                        {team.code} {n}{c>1?` ×${c}`:''}
                      </span>
                    );
                  })}
                </div>
              </div>
            ))}
          </>
        )
      }
    </div>
  );
}

function StatsTab({stickers,T}){
  const owned=Object.values(stickers).filter(v=>v==='owned').length;
  const dup=Object.values(stickers).filter(v=>v==='duplicate').length;
  const pct=Math.round(((owned+dup)/TOTAL)*100);
  const R=2*Math.PI*50;
  const groupStats=GROUPS_DATA.map(g=>{
    const keys=g.teams.flatMap(t=>Array.from({length:t.count},(_,i)=>k(t.id,i+1)));
    const o=keys.filter(x=>stickers[x]==='owned').length;
    const d=keys.filter(x=>stickers[x]==='duplicate').length;
    return{group:g,owned:o,dup:d,total:keys.length,pct:Math.round(((o+d)/keys.length)*100)};
  });
  return(
    <div style={{padding:'0 12px 20px'}}>
      <div style={{background:'linear-gradient(135deg,#17243A,#1E3050)',borderRadius:16,padding:20,marginBottom:12,textAlign:'center'}}>
        <div style={{position:'relative',width:120,height:120,margin:'0 auto'}}>
          <svg width="120" height="120" style={{transform:'rotate(-90deg)'}}>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#1C2B3A" strokeWidth="10"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#22C55E" strokeWidth="10"
              strokeDasharray={R} strokeDashoffset={R*(1-pct/100)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset 0.5s'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:28,fontWeight:900,color:'#fff',lineHeight:1}}>{pct}%</span>
            <span style={{fontSize:10,color:'#94A3B8'}}>completo</span>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:28,marginTop:16}}>
          {[['TENHO',owned,'#22C55E'],['DUPLIC.',dup,'#F59E0B'],['FALTAM',TOTAL-owned-dup,'#F87171']].map(([l,v,c])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:9,color:'#64748B'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {groupStats.map(({group,owned:o,dup:d,total,pct:gp})=>(
          <div key={group.id} style={{background:T.card,borderRadius:10,padding:'8px 12px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
              <div style={{width:26,height:26,borderRadius:7,background:group.color+'22',
                border:`2px solid ${group.color}`,display:'flex',alignItems:'center',justifyContent:'center',
                fontWeight:900,fontSize:13,color:group.color,flexShrink:0}}>
                {gp>=100?'✓':group.shortName==='STAR'?'⭐':group.shortName}
              </div>
              <span style={{flex:1,color:T.text,fontSize:12,fontWeight:700}}>{group.name}</span>
              <span style={{fontSize:12,fontWeight:700}}>
                <span style={{color:'#22C55E'}}>{o}</span>
                {d>0&&<span style={{color:'#F59E0B'}}>+{d}</span>}
                <span style={{color:T.textMuted}}>/{total}</span>
              </span>
              <span style={{fontSize:11,color:gp>=100?'#22C55E':T.textSub,minWidth:30,textAlign:'right'}}>{gp}%</span>
            </div>
            <div style={{height:4,background:T.bar,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${gp}%`,background:group.color,borderRadius:2}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const NAV=[
  {id:'album',  label:'Album', icon:'📖'},
  {id:'missing',label:'Faltam',icon:'🔍'},
  {id:'dups',   label:'Trocas',icon:'🔄'},
  {id:'stats',  label:'Stats', icon:'📊'},
  {id:'scan',   label:'Scan',  icon:'📷'},
];

// Build a flat lookup: "BRA 7" -> {teamId, num}
const STICKER_MAP = {};
for(const g of GROUPS_DATA)
  for(const t of g.teams)
    for(let n=1;n<=t.count;n++)
      STICKER_MAP[`${t.code} ${n}`]={teamId:t.id,num:n,team:t,group:g};

function ScanTab({stickers,onToggle,T}){
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const inputRef = useRef(null);
  const [mode, setMode] = useState('manual');
  const [manualInput, setManualInput] = useState('');
  const [scanning, setScanning] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [found, setFound] = useState(null);
  const [msg, setMsg] = useState('');
  const [camError, setCamError] = useState('');
  const [confirmed, setConfirmed] = useState('');

  // Tolerant lookup: "bra7", "BRA7", "bra 7", "BRA 7" all work
  const lookupCode = (raw)=>{
    const q = raw.toUpperCase().replace(/\s+/g,'');
    if(!q) return null;
    // Direct match after removing space
    for(const [key,val] of Object.entries(STICKER_MAP)){
      if(key.replace(' ','')===q) return {code:key,...val};
    }
    // Prefix match: try each known code as prefix
    const codes = [...new Set(Object.keys(STICKER_MAP).map(k=>k.split(' ')[0]))];
    for(const code of codes){
      if(q.startsWith(code)){
        const num = parseInt(q.slice(code.length));
        if(!isNaN(num)){
          const key = `${code} ${num}`;
          if(STICKER_MAP[key]) return {code:key,...STICKER_MAP[key]};
        }
      }
    }
    return null;
  };

  // Suggestions list while typing
  const suggestions = useMemo(()=>{
    const q = manualInput.toUpperCase().replace(/\s+/g,'');
    if(q.length < 2) return [];
    const seen = new Set();
    const results = [];
    for(const [key,val] of Object.entries(STICKER_MAP)){
      const ck = key.replace(' ','');
      const nameQ = val.team.name.toUpperCase().replace(/\s+/g,'');
      if((ck.startsWith(q)||nameQ.startsWith(q)) && !seen.has(key) && results.length<8){
        seen.add(key);
        results.push({code:key,...val});
      }
    }
    return results;
  },[manualInput]);

  const manualResult = useMemo(()=>{
    const q = manualInput.trim();
    if(!q) return null;
    return lookupCode(q);
  },[manualInput]);

  const startCamera = useCallback(async ()=>{
    setCamError('');
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
      });
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        videoRef.current.play();
        setScanning(true);
      }
    }catch(e){
      setCamError('Nao foi possivel acessar a camera. Verifique as permissoes no Safari.');
    }
  },[]);

  const stopCamera = useCallback(()=>{
    if(videoRef.current && videoRef.current.srcObject){
      videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
      videoRef.current.srcObject=null;
    }
    setScanning(false);
    setFound(null);
    setMsg('');
  },[]);

  useEffect(()=>()=>stopCamera(),[]);

  // Parse OCR text and find a valid sticker code
  const parseOCR = (text)=>{
    const clean = text.toUpperCase().replace(/[^A-Z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
    const parts = clean.match(/[A-Z]{2,4}\s*\d{1,2}/g)||[];
    for(const p of parts){
      const hit = lookupCode(p.replace(/\s+/g,''));
      if(hit) return hit;
    }
    return null;
  };

  // Capture full image — try multiple crops for best result
  const capture = useCallback(async ()=>{
    if(!videoRef.current||!canvasRef.current) return;
    setProcessing(true);
    setFound(null);
    setMsg('Lendo...');
    const v=videoRef.current;
    const c=canvasRef.current;
    const W=v.videoWidth, H=v.videoHeight;
    const ctx=c.getContext('2d');

    // Try 4 regions: top-right, top-left, full-top, full image
    const regions = [
      {x:W*0.55, y:0,      w:W*0.45, h:H*0.25}, // top-right (code location)
      {x:0,      y:0,      w:W,      h:H*0.3 }, // full top strip
      {x:W*0.3,  y:0,      w:W*0.7,  h:H*0.4 }, // right 70% top
      {x:0,      y:0,      w:W,      h:H      }, // full image fallback
    ];

    let hit = null;
    for(const r of regions){
      const rw=Math.floor(r.w), rh=Math.floor(r.h);
      c.width=rw*2; c.height=rh*2;
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(v, Math.floor(r.x),Math.floor(r.y),rw,rh, 0,0,rw*2,rh*2);
      // High contrast
      ctx.filter='contrast(2.5) brightness(1.2) grayscale(1)';
      ctx.drawImage(c,0,0);
      ctx.filter='none';
      try{
        const {data:{text}} = await Tesseract.recognize(c,'eng',{
          tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ',
          tessedit_pageseg_mode: r.h<H*0.35 ? '7' : '6',
        });
        hit = parseOCR(text);
        if(hit) break;
      }catch(e){}
    }

    if(hit){setFound(hit);setMsg('');}
    else setMsg('Nao reconheci. Tente digitar o codigo manualmente.');
    setProcessing(false);
  },[]);

  const markFound = useCallback((targetState, src)=>{
    const item = src || found;
    if(!item) return;
    const sk=k(item.teamId,item.num);
    const cur=stickers[sk]||'missing';
    let s=cur;
    let cycles=0;
    while(s!==targetState && cycles<3){
      onToggle(sk);
      s=CYCLE[(CYCLE.indexOf(s)+1)%3];
      cycles++;
    }
    setFound(null);
    setManualInput('');
    setConfirmed(`${item.code} marcada!`);
    setTimeout(()=>setConfirmed(''),2000);
    if(inputRef.current) inputRef.current.focus();
  },[found,stickers,onToggle]);

  const ResultCard = ({item})=>{
    const curState=stickers[k(item.teamId,item.num)]||'missing';
    return(
      <div style={{background:T.card,border:'2px solid #22C55E',borderRadius:12,padding:'14px',marginBottom:12}}>
        <div style={{color:T.textMuted,fontSize:10,marginBottom:6,letterSpacing:1}}>FIGURINHA ENCONTRADA</div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <span style={{fontSize:32}}>{f(item.team.flag)}</span>
          <div>
            <div style={{color:T.text,fontWeight:800,fontSize:20}}>{item.code}</div>
            <div style={{color:T.textSub,fontSize:12}}>{item.team.name} · {item.group.name}</div>
            <div style={{fontSize:11,fontWeight:700,marginTop:2,
              color:curState==='owned'?'#22C55E':curState==='duplicate'?'#F59E0B':'#F87171'}}>
              {curState==='owned'?'✓ Ja tenho':curState==='duplicate'?'2x Duplicada':'Faltando'}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>markFound('owned',item)} style={{flex:1,background:'#0D2E1A',border:'2px solid #22C55E',borderRadius:10,padding:'10px',color:'#22C55E',fontWeight:800,fontSize:13,fontFamily:'Barlow Condensed,sans-serif'}}>Tenho</button>
          <button onClick={()=>markFound('duplicate',item)} style={{flex:1,background:'#2E1E00',border:'2px solid #F59E0B',borderRadius:10,padding:'10px',color:'#F59E0B',fontWeight:800,fontSize:13,fontFamily:'Barlow Condensed,sans-serif'}}>Duplic.</button>
          <button onClick={()=>{setFound(null);setManualInput('');}} style={{flex:1,background:T.card2,border:'1px solid '+T.bar,borderRadius:10,padding:'10px',color:T.textSub,fontWeight:700,fontSize:13,fontFamily:'Barlow Condensed,sans-serif'}}>X</button>
        </div>
      </div>
    );
  };

  return(
    <div style={{padding:'0 12px 20px'}}>
      <div style={{display:'flex',gap:4,marginBottom:12,background:T.card2,borderRadius:10,padding:4}}>
        {[['manual','Digitar'],['camera','Camera']].map(([m,label])=>(
          <button key={m} onClick={()=>{setMode(m);if(m==='camera')startCamera();else stopCamera();}} style={{
            flex:1,border:'none',borderRadius:8,padding:'9px',fontWeight:700,fontSize:13,
            fontFamily:'Barlow Condensed,sans-serif',
            background:mode===m?(T===DARK?'#1E3050':'#fff'):T.card2,
            color:mode===m?T.text:T.textMuted,
          }}>{m==='manual'?'⌨️ '+label:'📷 '+label}</button>
        ))}
      </div>

      {confirmed&&<div style={{background:'#0D2E1A',border:'1px solid #22C55E',borderRadius:10,padding:'10px 14px',marginBottom:12,color:'#22C55E',fontSize:14,fontWeight:700,textAlign:'center'}}>✓ {confirmed}</div>}

      {mode==='manual'&&(
        <>
          <div style={{background:T.card2,borderRadius:12,padding:'12px 14px',marginBottom:0}}>
            <div style={{color:T.textMuted,fontSize:10,marginBottom:8,letterSpacing:1}}>CODIGO DA FIGURINHA (ex: PAN8 ou PAN 8)</div>
            <div style={{position:'relative'}}>
              <input
                ref={inputRef}
                type="text"
                autoFocus
                placeholder="BRA8, KSA1, PAN 8..."
                value={manualInput}
                onChange={e=>setManualInput(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==='Enter'&&manualResult) markFound('owned',manualResult);
                }}
                style={{
                  width:'100%',background:T.inputBg,
                  border:'2px solid '+(manualResult?'#22C55E':T.inputBorder),
                  borderRadius:10,padding:'14px 44px 14px 14px',
                  color:T.text,fontSize:22,fontWeight:700,outline:'none',
                  fontFamily:'monospace',letterSpacing:3,textTransform:'uppercase',
                }}
              />
              {manualInput&&<button onClick={()=>setManualInput('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:T.textMuted,fontSize:20,padding:4}}>×</button>}
            </div>
            <div style={{color:T.textMuted,fontSize:10,marginTop:5}}>
              Aceita com ou sem espaco, maiuscula ou minuscula
            </div>
          </div>

          {/* Suggestions dropdown */}
          {suggestions.length>0&&!manualResult&&(
            <div style={{background:T.card,border:'1px solid '+T.bar,borderRadius:'0 0 10px 10px',marginBottom:12,overflow:'hidden'}}>
              {suggestions.map(item=>{
                const cs=stickers[k(item.teamId,item.num)]||'missing';
                return(
                  <button key={item.code}
                    onClick={()=>setManualInput(item.code)}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                      background:'none',border:'none',borderBottom:'1px solid '+T.bar,textAlign:'left'}}>
                    <span style={{fontSize:18}}>{f(item.team.flag)}</span>
                    <span style={{flex:1,color:T.text,fontWeight:700,fontSize:13,fontFamily:'Barlow Condensed,sans-serif'}}>{item.code}</span>
                    <span style={{color:T.textMuted,fontSize:11}}>{item.team.name}</span>
                    <span style={{fontSize:10,fontWeight:700,
                      color:cs==='owned'?'#22C55E':cs==='duplicate'?'#F59E0B':'#F87171'}}>
                      {cs==='owned'?'✓':cs==='duplicate'?'2x':''}
                    </span>
                  </button>
                );
              })}
            </div>
          )}

          {manualResult&&<ResultCard item={manualResult}/>}
          {manualInput.length>=2&&!manualResult&&suggestions.length===0&&(
            <div style={{background:T.card2,borderRadius:10,padding:'10px 14px',marginTop:8,color:T.textMuted,fontSize:12,textAlign:'center'}}>
              Codigo nao encontrado
            </div>
          )}
        </>
      )}

      {mode==='camera'&&(
        <>
          {camError&&<div style={{background:'#2E1A1A',border:'1px solid #F87171',borderRadius:10,padding:'12px',marginBottom:12,color:'#F87171',fontSize:12}}>{camError}</div>}
          <div style={{position:'relative',background:'#000',borderRadius:14,overflow:'hidden',marginBottom:12,aspectRatio:'4/3'}}>
            <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover',display:scanning?'block':'none'}} playsInline muted/>
            <canvas ref={canvasRef} style={{display:'none'}}/>
            {!scanning&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10}}><span style={{fontSize:48}}>📷</span><span style={{color:'#94A3B8',fontSize:13}}>Camera desligada</span></div>}
            {scanning&&(
              <div style={{position:'absolute',inset:0,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <div style={{border:'2px solid rgba(125,214,209,0.7)',borderRadius:8,width:'80%',height:'50%',
                  boxShadow:'0 0 0 2000px rgba(0,0,0,0.35)',position:'relative'}}>
                  <span style={{position:'absolute',bottom:-22,left:'50%',transform:'translateX(-50%)',
                    background:'rgba(0,0,0,0.6)',color:'#7DD6D1',fontSize:10,padding:'2px 8px',borderRadius:4,whiteSpace:'nowrap'}}>
                    Enquadre a figurinha toda
                  </span>
                </div>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            {!scanning
              ?<button onClick={startCamera} style={{flex:1,background:'linear-gradient(135deg,#7DD6D1,#A8E6E2)',border:'none',borderRadius:10,padding:'12px',color:'#0D3B38',fontWeight:800,fontSize:14,fontFamily:'Barlow Condensed,sans-serif'}}>📷 Ligar Camera</button>
              :<>
                <button onClick={capture} disabled={processing} style={{flex:2,background:processing?'#2D3F55':'#22C55E',border:'none',borderRadius:10,padding:'12px',color:'#fff',fontWeight:800,fontSize:14,fontFamily:'Barlow Condensed,sans-serif',opacity:processing?0.7:1}}>
                  {processing?'Lendo...':'Capturar'}
                </button>
                <button onClick={stopCamera} style={{flex:1,background:T.card,border:'1px solid '+T.bar,borderRadius:10,padding:'12px',color:T.textSub,fontWeight:700,fontSize:13,fontFamily:'Barlow Condensed,sans-serif'}}>Parar</button>
              </>
            }
          </div>
          {msg&&<div style={{background:T.card2,borderRadius:10,padding:'10px 14px',marginBottom:12,color:T.textSub,fontSize:12,textAlign:'center'}}>{msg}</div>}
          {found&&<ResultCard item={found}/>}
          <div style={{background:T.card2,borderRadius:10,padding:'10px 12px'}}>
            <div style={{color:T.textMuted,fontSize:10,marginBottom:4,letterSpacing:1}}>DICA</div>
            <div style={{color:T.textSub,fontSize:11,lineHeight:1.7}}>
              Enquadre a figurinha inteira — o app testa varias regioes automaticamente. Boa iluminacao ajuda muito.
            </div>
          </div>
        </>
      )}
    </div>
  );
}


function App(){
  const [stickers,setStickers]=useState(()=>{
    try{const s=localStorage.getItem('panini2026');return s?JSON.parse(s):{}}catch{return{};}
  });
  const [dupCounts,setDupCounts]=useState(()=>{
    try{const s=localStorage.getItem('panini2026_counts');return s?JSON.parse(s):{}}catch{return{};}
  });
  const [tab,setTab]=useState('album');
  const [search,setSearch]=useState('');
  const [darkMode,setDarkMode]=useState(()=>{
    try{return localStorage.getItem('panini_dark')==='true'}catch{return false;}
  });

  const T = darkMode ? DARK : LIGHT;

  useEffect(()=>{
    try{localStorage.setItem('panini2026',JSON.stringify(stickers));}catch{}
  },[stickers]);

  useEffect(()=>{
    try{localStorage.setItem('panini2026_counts',JSON.stringify(dupCounts));}catch{}
  },[dupCounts]);

  const adjustCount=useCallback((sk, delta)=>{
    setDupCounts(prev=>{
      const cur=prev[sk]||1;
      const next=Math.max(1,cur+delta);
      return{...prev,[sk]:next};
    });
  },[]);

  useEffect(()=>{
    try{localStorage.setItem('panini_dark',darkMode);}catch{}
  },[darkMode]);

  const toggle=useCallback((sk)=>{
    setStickers(prev=>{
      const cur=prev[sk]||'missing';
      const next=CYCLE[(CYCLE.indexOf(cur)+1)%3];
      return{...prev,[sk]:next};
    });
  },[]);

  const owned=useMemo(()=>Object.values(stickers).filter(v=>v==='owned').length,[stickers]);
  const dup=useMemo(()=>Object.values(stickers).filter(v=>v==='duplicate').length,[stickers]);
  const pct=Math.round(((owned+dup)/TOTAL)*100);

  const filteredGroups=useMemo(()=>{
    const q=search.toLowerCase().trim();
    if(!q)return GROUPS_DATA;
    return GROUPS_DATA.map(g=>({
      ...g,
      teams:g.teams.filter(t=>
        t.name.toLowerCase().includes(q)||
        t.code.toLowerCase().includes(q)||
        g.name.toLowerCase().includes(q)
      )
    })).filter(g=>g.teams.length>0);
  },[search]);

  return(
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',flexDirection:'column',maxWidth:430,margin:'0 auto'}}>

      {/* HEADER */}
      <div style={{background:T.header,padding:'14px 16px 10px',
        borderBottom:`1px solid ${T.headerBorder}`,position:'sticky',top:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{color:T.headerText,fontWeight:900,fontSize:17,letterSpacing:0.5}}>🏆 Copa 2026 ⚽ beta v2</div>
            <div style={{color:T.headerSub,fontSize:10,marginTop:1}}>{owned+dup} de {TOTAL} figurinhas</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setDarkMode(d=>!d)} style={{
              background:'rgba(255,255,255,0.3)',border:'none',borderRadius:8,
              padding:'6px 9px',fontSize:16,lineHeight:1,color:T.headerText}}>
              {darkMode?'☀️':'🌙'}
            </button>
            <div style={{background:T.headerPct,borderRadius:10,padding:'7px 12px',textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:900,color:T.headerText,lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:9,color:T.headerSub}}>COMPLETO</div>
            </div>
          </div>
        </div>
        <div style={{height:3,background:T.progressBg,borderRadius:2,overflow:'hidden',marginTop:9}}>
          <div style={{height:'100%',width:`${pct}%`,background:T.headerText,borderRadius:2,transition:'width 0.3s'}}/>
        </div>
      </div>

      {/* LEGEND */}
      <div style={{display:'flex',gap:12,padding:'7px 14px',background:T.nav,borderBottom:`1px solid ${T.navBorder}`,justifyContent:'center'}}>
        {[['#2D3F55','Falta',T.navInactive],['#22C55E','Tenho','#22C55E'],['#F59E0B','Duplic.','#F59E0B'],['#7C3AED','Especial','#A78BFA']].map(([color,label,tc])=>(
          <div key={label} style={{display:'flex',alignItems:'center',gap:3}}>
            <div style={{width:9,height:9,borderRadius:2,border:`2px solid ${color}`,background:color+'33'}}/>
            <span style={{fontSize:9,color:tc,fontWeight:600}}>{label}</span>
          </div>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflowY:'auto',paddingTop:10}}>
        {tab==='album'
          ?<div style={{padding:'0 12px 20px'}}>
            <div style={{position:'relative',marginBottom:12}}>
              <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:16,pointerEvents:'none'}}>🔍</span>
              <input type="text"
                placeholder="Buscar selecao... (ex: Brasil, BRA, Grupo C)"
                value={search} onChange={e=>setSearch(e.target.value)}
                style={{width:'100%',background:T.inputBg,border:`1px solid ${T.inputBorder}`,
                  borderRadius:10,padding:'10px 36px 10px 38px',
                  color:T.text,fontSize:13,outline:'none'}}
              />
              {search&&<button onClick={()=>setSearch('')} style={{
                position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',color:T.textMuted,fontSize:18,lineHeight:1,padding:2}}>×</button>}
            </div>
            {filteredGroups.length===0
              ?<div style={{textAlign:'center',padding:'40px 0',color:T.textMuted,fontSize:13}}>Nenhuma selecao encontrada</div>
              :filteredGroups.map(g=><GroupSection key={g.id} group={g} stickers={stickers} dupCounts={dupCounts} onToggle={toggle} onCount={adjustCount} T={T}/>)
            }
          </div>
          :tab==='missing'?<MissingTab stickers={stickers} T={T}/>
          :tab==='dups'?<DupTab stickers={stickers} dupCounts={dupCounts} T={T}/>
          :tab==='scan'?<ScanTab stickers={stickers} onToggle={toggle} T={T}/>
          :<StatsTab stickers={stickers} T={T}/>
        }
      </div>

      {/* BOTTOM NAV — turquesa */}
      <div style={{display:'flex',background:T.nav,borderTop:`1px solid ${T.navBorder}`,padding:'6px 0 8px',position:'sticky',bottom:0}}>
        {NAV.map(item=>(
          <button key={item.id} onClick={()=>setTab(item.id)} style={{
            flex:1,display:'flex',flexDirection:'column',alignItems:'center',
            gap:2,border:'none',background:'transparent',padding:'4px 0'}}>
            <span style={{fontSize:19}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===item.id?700:500,
              color:tab===item.id?T.navActive:T.navInactive,
              borderBottom:tab===item.id?`2px solid ${T.navActive}`:'2px solid transparent'}}>
              {item.label}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
